[provider]
# LLM provider used by llm_client.py. Supported values: openai, anthropic.
name = openai

[models]
classify = gpt-5.5
annotate = gpt-5.5
summarize = gpt-5.5
summarize_author = gpt-5.5
qa = gpt-5.5

[annotation]
schema_version = 3
# 0 means send the full record text.
record_chars = 0
max_input_tokens = 900000
max_output_tokens = 4096
default_batch_size = 1

[classification]
schema_version = 2
max_input_tokens = 900000
max_output_tokens = 1024
default_batch_size = 1
include_candidate_topics = false

[open_topics]
max_output_tokens = 1024

[summary]
# 0 means no topic-record cap.
record_limit = 0
record_chars = 2000
chunk_size = 40
chars_per_token = 4

[qa]
max_output_tokens = 8192

[credentials]
# Keep secrets in .env or the process environment. These names are documented here.
openai_api_key_env = OPENAI_API_KEY
anthropic_api_key_env = ANTHROPIC_API_KEY
